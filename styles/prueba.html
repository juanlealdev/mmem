<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testimonios MMEM</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .testimonial-section {
      width: 100%;
      background-image: url('https://cdn.mmem.com.co/Images/2025/countdown-bg%20(1).webp');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      padding: 80px 20px;
      display: flex;
      justify-content: center;
    }

    .testimonial-frame {
      border: 2px solid white;
      border-radius: 30px;
      padding: 40px 30px;
      max-width: 1100px;
      width: 100%;
      color: white;
      position: relative;
      box-sizing: border-box;
    }

    .testimonial-title {
      font-size: 24px;
      margin-bottom: 30px;
    }

    .testimonial-body {
      display: flex;
      flex-direction: row;
      gap: 40px;
      justify-content: space-between;
      align-items: center;
    }

    .testimonial-videos {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .testimonial-videos img {
      width: 260px;
      height: 150px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
    }

    .testimonial-carousel {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-grow: 1;
      justify-content: center;
    }

    .testimonial-image-wrapper {
      width: 340px;
      height: 180px;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .testimonial-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .arrow {
      font-size: 32px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .testimonial-logo {
      position: absolute;
      bottom: 20px;
      right: 30px;
      width: 160px;
    }

    /* Prevención de wrap */
    @media (max-width: 800px) {
      .testimonial-body {
        flex-direction: column;
      }

      .testimonial-carousel {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <section class="testimonial-section">
    <div class="testimonial-frame">
      <h2 class="testimonial-title">Testimonio <strong>MMEM</strong></h2>
      <div class="testimonial-body">
        <!-- Videos -->
        <div class="testimonial-videos">
          <img src="https://cdn.mmem.com.co/Images/2025/t1%402x.webp" alt="Video Testimonio 1" />
          <img src="https://cdn.mmem.com.co/Images/2025/t2%402x.webp" alt="Video Testimonio 2" />
        </div>

        <!-- Carrusel -->
        <div class="testimonial-carousel">
          <div class="arrow" onclick="prevTestimonial()">&#8249;</div>
          <div class="testimonial-image-wrapper">
            <img id="testimonial-img" src="" alt="Testimonio" />
          </div>
          <div class="arrow" onclick="nextTestimonial()">&#8250;</div>
        </div>
      </div>

      <img class="testimonial-logo" src="https://cdn.mmem.com.co/Images/2025/mmem_logo.svg" alt="MMEM Logo" />
    </div>
  </section>

  <script>
    const testimonialImages = [
      "https://cdn.mmem.com.co/Images/2025/ig-testimonio.webp",
      "https://cdn.mmem.com.co/Images/2025/ig-testimonio2.webp",
      "https://cdn.mmem.com.co/Images/2025/ig-testimonio3.webp"
    ];

    let testimonialIndex = 0;
    const testimonialImgElement = document.getElementById("testimonial-img");

    function updateTestimonial() {
      testimonialImgElement.src = testimonialImages[testimonialIndex];
    }

    function nextTestimonial() {
      testimonialIndex = (testimonialIndex + 1) % testimonialImages.length;
      updateTestimonial();
    }

    function prevTestimonial() {
      testimonialIndex = (testimonialIndex - 1 + testimonialImages.length) % testimonialImages.length;
      updateTestimonial();
    }

    document.addEventListener("DOMContentLoaded", updateTestimonial);
  </script>

</body>
</html>
